<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Збір для БК Шаблі</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2d2d2d; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border-top: 4px solid #e63946; }
        h1 { color: #e63946; margin-bottom: 0.5rem; }
        p { color: #ccc; margin-bottom: 2rem; }
        .pay-button { background-color: #e63946; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        .pay-button:hover { background-color: #c12a36; transform: scale(1.05); }
        .footer { margin-top: 2rem; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>БК "ШАБЛІ" 🏀</h1>
    <p>Внесок на гру / оренду залу</p>
    
    <a href="https://send.monobank.ua/YOUR_ID" class="pay-button">ОПЛАТИТЬ ЧЕРЕЗ MONOBANK</a>

    <div class="footer">
        Президент клубу: В’ячеслав Підкалюк
    </div>
</div>

</body>
</html>
